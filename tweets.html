<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Latest updates and real-time posts from SEVENTHAURA on X (@seventhaura).">
  <meta name="theme-color" content="#F5F2EB">
  
  <title>SEVENTHAURA Updates</title>
  
  <!-- Preconnect for faster X widget load -->
  <link rel="preconnect" href="https://platform.twitter.com">
  <link rel="preconnect" href="https://twitter.com">
  
  <style>
    @font-face {
      font-family: 'MainFont';
      src: url('assets/main font.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --bg: #F5F2EB;
      --text: #111111;
      --sub: #666666;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-weight: 300;
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }
    main {
      max-width: 820px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-family: 'MainFont', 'Impact', 'Arial Black', sans-serif;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 40px;
    }
    .timeline-container {
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(17, 17, 17, 0.08);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.04);
      width: 100%;
    }
    .links {
      margin-top: 36px;
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }
    .profile-link {
      color: var(--text);
      font-size: 1.05rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.3s ease;
    }
    .profile-link:hover,
    .profile-link:focus {
      opacity: 1;
    }
    .live-note {
      margin-top: 12px;
      font-size: 0.95rem;
      opacity: 0.6;
    }
    @media (max-width: 768px) {
      body { padding: 30px 15px; }
      h1 {
        font-size: clamp(2.2rem, 8vw, 3.8rem);
        letter-spacing: 0.15em;
      }
      .timeline-container { padding: 12px; }
    }
  </style>
</head>
<body>

  <main>
    <h1>Updates</h1>
    
    <div class="timeline-container" aria-labelledby="updates-heading">
      <!-- Official X Embedded Timeline for @seventhaura -->
      <a class="twitter-timeline"
         data-height="850"
         data-theme="light"
         data-chrome="noheader nofooter noborders transparent"
         href="https://twitter.com/seventhaura">Tweets by @seventhaura</a>
      <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    </div>

    <div class="live-note">Live updates from X — refreshes automatically on page load</div>

    <div class="links">
      <a href="/" class="profile-link">← Back to Shop</a>
      <a href="https://x.com/seventhaura" target="_blank" rel="noopener noreferrer" class="profile-link">
        View full profile on X → @seventhaura
      </a>
    </div>
  </main>

</body>
</html>
