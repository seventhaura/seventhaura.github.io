<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="SEVENTHAURA — Limited apparel and accessories. Official drops." />
  <meta name="theme-color" content="#F5F2EB">
  <title>SEVENTHAURA</title>
  
  <script src="https://js.stripe.com/v3/"></script>
  <link rel="preconnect" href="https://platform.twitter.com">
  <link rel="preconnect" href="https://twitter.com">

  <style>
    @font-face {
      font-family: 'MainFont';
      src: url('assets/main font.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --bg: #F5F2EB;
      --text: #111111;
      --sub: #666666;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-weight: 300;
      line-height: 1.2;
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: clamp(100px, 10vw, 160px) clamp(40px, 6vw, 80px) clamp(120px, 12vw, 180px);
      text-align: center;
      width: 100%;
      overflow-x: hidden;
    }
    h1 {
      font-family: 'MainFont', 'Impact', 'Arial Black', sans-serif;
      font-size: clamp(3.2rem, 11vw, 7.8rem);
      font-weight: 900;
      letter-spacing: clamp(0.2em, 3vw, 1.1em);
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: clamp(80px, 12vw, 140px);
      line-height: 0.9;
    }
    @media (max-width: 768px) {
      h1 { letter-spacing: 0.12em; }
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 120px 80px;
    }
    .product {
      text-align: center;
      max-width: 460px;
      margin: 0 auto;
      transition: transform 0.4s ease;
    }
    .product:hover {
      transform: translateY(-12px);
    }
    .main-image {
      width: 100% !important;
      max-width: 420px !important;
      height: auto !important;
      display: block;
      margin: 0 auto;
      object-fit: contain;
      max-height: 420px !important;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .product:hover .main-image {
      transform: scale(1.04);
    }
    .extra-images {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 24px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }
    .extra-img {
      width: 48%;
      height: auto;
      object-fit: contain;
    }
    @media (max-width: 768px) {
      .main-image { max-width: 100% !important; max-height: 320px; }
      .extra-images { gap: 12px; }
      .products { gap: 80px 30px; }
      .container { padding: clamp(80px, 12vw, 120px) clamp(20px, 5vw, 40px) clamp(100px, 14vw, 140px); }
    }
    .item-code {
      font-family: 'MainFont', 'Impact', 'Arial Black', sans-serif;
      font-size: 3.2rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      margin: 32px 0 12px;
      opacity: 0.85;
    }
    .sub {
      font-size: 1.35rem;
      letter-spacing: 0.25em;
      opacity: 0.65;
      margin-bottom: 28px;
    }
    .buy-link, .notify-link {
      display: inline-block;
      color: var(--text);
      font-size: 1.05rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--text);
      padding: 16px 38px;
      transition: all 0.4s ease;
      margin-top: 12px;
    }
    .buy-link:hover, .notify-link:hover {
      background: var(--text);
      color: var(--bg);
    }

    /* ── Yeezy-style Tweets Preview ── */
    .tweets-preview {
      margin: clamp(120px, 14vw, 180px) auto 0;
      max-width: 820px;
      text-align: center;
    }
    .tweets-preview h2 {
      font-family: 'MainFont', 'Impact', sans-serif;
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 48px;
    }
    .timeline-wrapper {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 16px;
      padding: 28px 24px 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    }
    .more-link {
      display: inline-block;
      margin-top: 32px;
      color: var(--text);
      font-size: 1.1rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.3s ease;
    }
    .more-link:hover { opacity: 1; }

    footer {
      margin-top: clamp(140px, 16vw, 200px);
      padding: 60px 20px 80px;
      text-align: center;
      font-size: 1rem;
      opacity: 0.75;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 52px;
      margin-bottom: 24px;
    }
    .social-link {
      color: var(--text);
      text-decoration: none;
      font-size: 1.15rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: opacity 0.4s;
    }
    .social-link:hover { opacity: 1; }
    /* rest of your footer styles unchanged but cleaned */
    .contact-info, .legal-notice, .policy-links { margin-top: 20px; }
    .policy-links a { margin: 0 14px; }
  </style>
</head>
